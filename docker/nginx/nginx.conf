server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|svg|css|js|webp|ico)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Don't serve docker/internal files
    location /docker/ {
        deny all;
        return 404;
    }
    location /.env {
        deny all;
        return 404;
    }
    location /CLAUDE.md {
        deny all;
        return 404;
    }
}
