# Running Club - Nginx Static Site
# Supabase runs separately via: supabase start
# Usage: docker compose up -d

services:
  nginx:
    image: nginx:alpine
    ports:
      - "${WEB_PORT:-3001}:80"
    volumes:
      - .:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
